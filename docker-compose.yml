version: "3.8"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salemate-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salemate-worker
    restart: unless-stopped
    command: celery -A app.workers worker --loglevel=info --concurrency=2
    env_file:
      - .env
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salemate-beat
    restart: unless-stopped
    command: celery -A app.workers beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: salemate-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M

  nginx:
    image: nginx:alpine
    container_name: salemate-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
